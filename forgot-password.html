<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Şifremi Unuttum | Atilla Çiçekli İç Giyim</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/cicekli-ic-giyim/style.css">
  <link rel="stylesheet" href="/cicekli-ic-giyim/form.css">
  <style>
    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 25px;
    }

    .step {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: #f0f0f0;
      color: #aaa;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s;
    }

    .step.active {
      background-color: #e91e63;
      color: white;
    }

    .step.done {
      background-color: #c8e6c9;
      color: #2e7d32;
    }

    .step-line {
      width: 40px;
      height: 2px;
      background-color: #ddd;
      align-self: center;
    }

    #formMessage {
      text-align: center;
      font-size: 14px;
      margin-bottom: 12px;
      min-height: 20px;
    }

    #formMessage.success { color: #2e7d32; }
    #formMessage.error   { color: #c62828; }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Şifremi Unuttum</h2>

    <div class="step-indicator">
      <div class="step active" id="step1">1</div>
      <div class="step-line"></div>
      <div class="step" id="step2">2</div>
    </div>

    <div id="formMessage"></div>

    <!-- 1. Aşama: Kod Gönder -->
    <form id="requestResetForm">
      <input type="email" id="email" placeholder="Kayıtlı E-posta" required>
      <input type="tel" id="phone" placeholder="Telefon Numarası (05xx...)" required>
      <button type="submit">Doğrulama Kodu Gönder</button>
    </form>

    <!-- 2. Aşama: Kod Doğrula ve Yeni Şifre Belirle -->
    <form id="verifyCodeForm" style="display: none;">
      <input type="text" id="verificationCode" placeholder="Doğrulama Kodu" maxlength="6" required>
      <input type="password" id="newPassword" placeholder="Yeni Şifre" required>
      <input type="password" id="newPasswordConfirm" placeholder="Yeni Şifre Tekrar" required>
      <button type="submit">Şifreyi Sıfırla</button>
    </form>

    <p style="text-align:center; margin-top: 15px; font-size: 14px;">
      <a href="/cicekli-ic-giyim/login.html" style="color:#e91e63; text-decoration:none; font-weight:500;">
        ← Giriş Yap
      </a>
    </p>
  </div>

  <script src="/cicekli-ic-giyim/js/forgot-password.js"></script>
  <script>
    const requestForm = document.getElementById('requestResetForm');
    const verifyForm  = document.getElementById('verifyCodeForm');
    const msg         = document.getElementById('formMessage');
    const step1       = document.getElementById('step1');
    const step2       = document.getElementById('step2');

    requestForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!email || !phone) {
        msg.textContent = 'Lütfen tüm alanları doldurun.';
        msg.className = 'error';
        return;
      }

      // Kodu gönder (forgot-password.js içinde gerçek işlem yapılır)
      msg.textContent = 'Doğrulama kodu ' + email + ' adresine gönderildi.';
      msg.className = 'success';
      requestForm.style.display = 'none';
      verifyForm.style.display  = 'block';
      step1.classList.remove('active');
      step1.classList.add('done');
      step1.textContent = '✓';
      step2.classList.add('active');
    });

    verifyForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const newPass    = document.getElementById('newPassword').value;
      const confirmPass = document.getElementById('newPasswordConfirm').value;

      if (newPass !== confirmPass) {
        msg.textContent = 'Şifreler eşleşmiyor.';
        msg.className = 'error';
        return;
      }

      if (newPass.length < 6) {
        msg.textContent = 'Şifre en az 6 karakter olmalıdır.';
        msg.className = 'error';
        return;
      }

      msg.textContent = '✅ Şifreniz başarıyla sıfırlandı! Giriş sayfasına yönlendiriliyorsunuz...';
      msg.className = 'success';
      setTimeout(() => {
        window.location.href = '/cicekli-ic-giyim/login.html';
      }, 2000);
    });
  </script>
</body>
</html>
