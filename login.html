<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap | Atilla Çiçekli İç Giyim</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/cicekli-ic-giyim/style.css">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(to right, #f8bbd0, #f1f1f1);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      background-color: #fff;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    .form-container h2 {
      text-align: center;
      color: #e91e63;
      margin-bottom: 25px;
      font-weight: 600;
    }

    .form-container input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Montserrat', sans-serif;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }

    .form-container input:focus {
      outline: none;
      border-color: #e91e63;
    }

    .form-container button {
      width: 100%;
      padding: 12px;
      background-color: #e91e63;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-bottom: 12px;
    }

    .form-container button:hover {
      background-color: #c2185b;
    }

    #error-message {
      color: #c62828;
      text-align: center;
      font-size: 14px;
      margin-bottom: 10px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-container p {
      text-align: center;
      font-size: 14px;
      margin-top: 8px;
    }

    .form-container a {
      color: #e91e63;
      text-decoration: none;
      font-weight: 500;
    }

    .form-container a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Giriş Yap</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="E-posta" required>
      <input type="password" id="password" placeholder="Şifre" required>
      <p id="error-message">E-posta veya şifre yanlış.</p>
      <button type="submit">Giriş Yap</button>
    </form>
    <p><a href="/cicekli-ic-giyim/forgot-password.html">Şifremi Unuttum</a></p>
    <p>Hesabınız yok mu? <a href="/cicekli-ic-giyim/register.html">Üye Ol</a></p>
  </div>

  <script src="/cicekli-ic-giyim/js/login.js"></script>
  <script>
    document.getElementById('loginForm').onsubmit = function(event) {
      event.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-message');

      // localStorage'daki kullanıcıları kontrol et
      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const user  = users.find(u => u.email === email && u.password === password);

      // Admin kontrolü
      const isAdmin = email === 'admin@atilla.com' && password === 'admin123';

      if (user || isAdmin) {
        sessionStorage.setItem('loggedInUser', JSON.stringify(user || { email, role: 'admin' }));
        errorMsg.style.display = 'none';
        window.location.href = isAdmin
          ? '/cicekli-ic-giyim/admin.html'
          : '/cicekli-ic-giyim/index.html';
      } else {
        errorMsg.style.display = 'block';
      }
    };
  </script>
</body>
</html>
